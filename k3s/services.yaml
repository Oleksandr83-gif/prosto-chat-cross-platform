apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prosto-chat
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: prosto-chat
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: prosto-chat
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: prosto-chat
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80

