apiVersion: v1
kind: Secret
metadata:
  name: prosto-chat-secrets
  namespace: prosto-chat
type: Opaque
stringData:
  POSTGRES_DB: chat_db
  POSTGRES_USER: chat
  POSTGRES_PASSWORD: chat
  DATABASE_URL: postgresql+psycopg://chat:chat@postgres:5432/chat_db
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JWT_SECRET: change-this-secret-before-production
