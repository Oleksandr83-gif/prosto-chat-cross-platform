apiVersion: v1
kind: Secret
metadata:
  name: prosto-chat-secrets
  namespace: prosto-chat
type: Opaque
stringData:
  POSTGRES_DB: chat_db
  POSTGRES_USER: chat
  POSTGRES_PASSWORD: replace-with-a-long-random-password
  DATABASE_URL: postgresql+psycopg://chat:replace-with-url-encoded-password@postgres:5432/chat_db
  RABBITMQ_URL: amqp://replace-with-rabbitmq-user:replace-with-rabbitmq-password@rabbitmq:5672/
  JWT_SECRET: replace-with-a-long-random-jwt-secret
