apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prosto-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: prosto-chat-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

